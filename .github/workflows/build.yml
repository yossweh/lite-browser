name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Sign APK with v1+v2
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          APK=app/build/outputs/apk/release/app-release-unsigned.apk
          ${BUILD_TOOLS}apksigner sign \
            --ks ~/.android/debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --v1-signing-enabled true --v2-signing-enabled true \
            $APK
          ${BUILD_TOOLS}apksigner verify --verbose $APK

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/LiteBrowser-v${{ github.run_number }}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteBrowser
          path: app/build/outputs/apk/release/LiteBrowser-v${{ github.run_number }}.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LiteBrowser v${{ github.run_number }}
          files: app/build/outputs/apk/release/LiteBrowser-v${{ github.run_number }}.apk
          generate_release_notes: true
