name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Sign APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/LiteBrowser-unsigned.apk
          apksigner sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --out app/build/outputs/apk/debug/LiteBrowser-v${{ github.run_number }}.apk \
            app/build/outputs/apk/debug/LiteBrowser-unsigned.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: LiteBrowser v${{ github.run_number }}
          files: app/build/outputs/apk/debug/LiteBrowser-v${{ github.run_number }}.apk
          generate_release_notes: true
