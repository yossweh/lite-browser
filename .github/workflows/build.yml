name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Sign Release APK with debug key
      run: |
        # Find the debug keystore
        DEBUG_KEYSTORE=~/.android/debug.keystore
        if [ ! -f "$DEBUG_KEYSTORE" ]; then
          mkdir -p ~/.android
          keytool -genkey -v -keystore "$DEBUG_KEYSTORE" \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
        fi
        
        # Sign the release APK
        cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
        cd app/build/outputs/apk/release
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
          -keystore "$DEBUG_KEYSTORE" \
          -storepass android -keypass android \
          app-release.apk androiddebugkey
        cd -

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: LiteBrowser-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: LiteBrowser-release
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
