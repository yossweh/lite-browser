name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APKs
      run: |
        ./gradlew assembleDebug assembleRelease

    - name: Verify APKs exist
      run: |
        ls -lh app/build/outputs/apk/debug/app-debug.apk
        ls -lh app/build/outputs/apk/release/app-release-unsigned.apk || ls -lh app/build/outputs/apk/release/app-release.apk
        # Verify signing
        apksigner verify --print-certs app/build/outputs/apk/debug/app-debug.apk || true

    - name: Rename release APK
      run: |
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/app-release.apk
        fi

    - name: Upload APKs to Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        tag_name: v2.0
        name: LiteBrowser v2.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
